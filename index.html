<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>每日卡路里记录</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f2f7;
        --surface: rgba(255, 255, 255, 0.82);
        --surface-strong: #fff;
        --control: rgba(255, 255, 255, 0.92);
        --ink: #1c1c1e;
        --muted: #6e6e73;
        --line: rgba(60, 60, 67, 0.14);
        --soft: #f2f2f7;
        --quick: #f3faf6;
        --quick-line: rgba(52, 199, 89, 0.32);
        --row-line: rgba(60, 60, 67, 0.1);
        --empty: #8e8e93;
        --blue: #007aff;
        --green: #30c759;
        --orange: #ff9500;
        --red: #ff3b30;
        --purple: #af52de;
        --on-blue: #fff;
        --shadow: 0 10px 32px rgba(0, 0, 0, 0.055), 0 1px 2px rgba(0, 0, 0, 0.035);
        --small-shadow: 0 3px 12px rgba(0, 0, 0, 0.055);
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #000;
        --surface: rgba(28, 28, 30, 0.88);
        --surface-strong: #1c1c1e;
        --control: #2c2c2e;
        --ink: #f5f5f7;
        --muted: #aeaeb2;
        --line: rgba(255, 255, 255, 0.13);
        --soft: #2c2c2e;
        --quick: #14271b;
        --quick-line: rgba(48, 209, 88, 0.42);
        --row-line: rgba(255, 255, 255, 0.09);
        --empty: #8e8e93;
        --blue: #0a84ff;
        --green: #30d158;
        --orange: #ffb340;
        --red: #ff756d;
        --purple: #bf5af2;
        --on-blue: #fff;
        --shadow: 0 12px 36px rgba(0, 0, 0, 0.34);
        --small-shadow: 0 4px 16px rgba(0, 0, 0, 0.28);
      }
      :root[data-theme="dark"] body {
        background: var(--bg);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        font-optical-sizing: auto;
        -webkit-font-smoothing: antialiased;
      }
      button, input, select { font: inherit; }
      button { cursor: pointer; touch-action: manipulation; }
      main { width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 16px 0 30px; }
      h1, h2, h3, p { margin-top: 0; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
        padding: 2px 0;
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .brand-mark {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border-radius: 13px;
        color: #fff;
        background: var(--green);
        box-shadow: 0 7px 18px rgba(48, 199, 89, 0.24);
        font-size: 23px;
        font-weight: 900;
      }
      h1 { margin-bottom: 3px; font-size: 24px; line-height: 1.12; letter-spacing: -0.02em; }
      .subtitle { margin-bottom: 0; color: var(--muted); font-size: 13px; font-weight: 500; }
      .header-actions { display: flex; align-items: center; gap: 7px; }
      .date-nav { display: flex; align-items: center; gap: 7px; }
      .date-nav input { width: 152px; text-align: center; }
      input, select {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 11px;
        color: var(--ink);
        background: var(--control);
        transition: border-color 160ms ease, box-shadow 160ms ease, background-color 220ms ease;
      }
      input::placeholder { color: color-mix(in srgb, var(--muted), transparent 18%); }
      input:focus-visible, select:focus-visible, button:focus-visible, summary:focus-visible {
        outline: 3px solid rgba(36, 117, 217, 0.2);
        outline-offset: 2px;
      }
      .icon-btn, .btn {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 13px;
        color: var(--ink);
        background: var(--control);
        font-size: 13px;
        font-weight: 650;
        transition: transform 100ms ease-out, background-color 180ms ease, border-color 180ms ease, opacity 180ms ease;
      }
      .icon-btn:hover, .btn:hover { background: color-mix(in srgb, var(--control), var(--ink) 4%); }
      .icon-btn:active, .btn:active, .category-tab:active, .food-chip:active, .day:active, summary:active { transform: scale(0.97); }
      .icon-btn { width: 40px; padding: 0; font-size: 20px; }
      .theme-toggle { width: auto; min-width: 50px; padding: 0 11px; font-size: 13px; }
      .btn.primary { border-color: var(--blue); color: var(--on-blue); background: var(--blue); }
      .btn.danger, .delete-btn { color: var(--red); }
      .app-grid {
        display: grid;
        grid-template-columns: minmax(480px, 1.05fr) minmax(0, 0.95fr);
        grid-template-areas:
          "add summary"
          "meals meals"
          "tools tools";
        gap: 12px;
        align-items: start;
      }
      .app-grid > *, .tools > *, .quick-add > * { min-width: 0; }
      .summary-panel { grid-area: summary; align-self: stretch; display: grid; }
      .quick-add { grid-area: add; }
      .meals-panel { grid-area: meals; }
      .tools { grid-area: tools; }
      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
      }
      .panel-body { padding: 15px; }
      .summary-panel .panel-body { display: grid; align-items: center; }
      .metrics {
        display: grid;
        grid-template-columns: 184px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
      }
      .calorie-ring {
        position: relative;
        display: grid;
        place-items: center;
        width: min(184px, 100%);
        aspect-ratio: 1;
        border-radius: 50%;
        background: conic-gradient(var(--green) calc(var(--pct) * 1%), rgba(148, 163, 184, 0.22) 0);
        box-shadow: inset 0 0 0 1px var(--line), var(--small-shadow);
      }
      .calorie-ring::before {
        content: "";
        position: absolute;
        inset: 15px;
        border-radius: 50%;
        background: var(--surface-strong);
        box-shadow: inset 0 0 0 1px var(--row-line);
      }
      .ring-center { position: relative; text-align: center; }
      .ring-center strong { display: block; font-size: 38px; line-height: 1; letter-spacing: 0; }
      .ring-center span { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; font-weight: 800; }
      .summary-side { display: grid; gap: 10px; }
      .summary-title { display: flex; align-items: start; justify-content: space-between; gap: 12px; }
      .summary-title h2 { margin: 0; font-size: 19px; letter-spacing: 0; }
      .summary-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; font-weight: 700; }
      .macro-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .metric {
        min-width: 0;
        display: grid;
        justify-items: center;
        align-items: start;
        gap: 7px;
        padding: 8px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        text-align: center;
      }
      .mini-ring {
        display: grid;
        place-items: center;
        width: 42px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: conic-gradient(var(--tone) calc(var(--pct) * 1%), rgba(148, 163, 184, 0.22) 0);
        color: var(--tone);
        font-size: 11px;
        font-weight: 900;
      }
      .mini-ring::before {
        content: attr(data-percent);
        display: grid;
        place-items: center;
        width: 31px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--surface-strong);
      }
      .metric span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; }
      .metric strong { display: block; margin-top: 3px; font-size: 18px; line-height: 1.05; letter-spacing: 0; }
      .metric small { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; font-weight: 700; }
      .metric[data-kind="carb"] { --tone: var(--orange); }
      .metric[data-kind="protein"] { --tone: var(--green); }
      .metric[data-kind="fat"] { --tone: var(--blue); }
      .remaining-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        overflow: hidden;
        border: 0;
        border-radius: 10px;
        background: var(--row-line);
      }
      .remaining-item { padding: 8px 10px; background: var(--surface-strong); }
      .remaining-item span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; }
      .remaining-item strong { display: block; margin-top: 4px; font-size: 17px; }
      .quick-add {
        border: 1px solid var(--quick-line);
        border-radius: 16px;
        padding: 15px;
        background: var(--quick);
        box-shadow: var(--shadow);
      }
      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .section-title h2 { margin: 0; color: var(--blue); font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
      .quick-add .section-title h2 { color: var(--green); font-size: 20px; }
      .category-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 4px;
        border: 1px solid var(--quick-line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.42);
      }
      .category-tab {
        border: 0;
        border-radius: 9px;
        padding: 8px;
        color: var(--muted);
        background: transparent;
        font-weight: 650;
        transition: transform 100ms ease-out, color 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      }
      .category-tab.active { color: #0f6b35; background: var(--surface-strong); box-shadow: var(--small-shadow); }
      :root[data-theme="dark"] .category-tabs { background: rgba(255, 255, 255, 0.06); }
      :root[data-theme="dark"] .category-tab.active { color: var(--green); background: #26352d; }
      .food-search {
        position: relative;
        margin-top: 10px;
      }
      .food-search input {
        padding-left: 34px;
        background: var(--surface-strong);
      }
      .food-search::before {
        content: "⌕";
        position: absolute;
        left: 12px;
        top: 50%;
        z-index: 1;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 17px;
        font-weight: 900;
      }
      .food-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        max-height: 170px;
        overflow-y: auto;
        padding: 10px 1px;
      }
      .food-chip {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 13px;
        color: var(--ink);
        background: var(--surface-strong);
        font-size: 14px;
        font-weight: 650;
        text-align: left;
        transition: transform 100ms ease-out, border-color 180ms ease, background-color 180ms ease;
      }
      .food-chip.active { border-color: var(--green); color: #0f6b35; background: rgba(50, 199, 89, 0.12); }
      :root[data-theme="dark"] .food-chip.active {
        color: var(--green);
        background: rgba(79, 218, 121, 0.16);
      }
      .food-chip strong, .food-chip small { display: block; }
      .food-chip small { margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 800; }
      .add-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 122px 96px 92px;
        gap: 8px;
        align-items: end;
        border-top: 1px solid var(--quick-line);
        padding-top: 10px;
      }
      .selected-food {
        display: grid;
        align-content: center;
        min-height: 38px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }
      .selected-food b { color: var(--ink); }
      label { display: grid; gap: 5px; }
      .field-label { color: var(--muted); font-size: 11px; font-weight: 900; }
      .meals { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
      .meals-panel .section-title h2 { color: var(--ink); }
      .meal-section { border: 1px solid var(--line); border-radius: 12px; background: var(--surface-strong); box-shadow: none; }
      .meal-head {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        min-height: 50px;
        padding: 9px 12px;
        cursor: pointer;
        list-style: none;
      }
      .meal-head::-webkit-details-marker { display: none; }
      .meal-head::after { content: "›"; color: var(--muted); font-size: 22px; font-weight: 500; transform: rotate(90deg); transition: transform 220ms cubic-bezier(.25,.8,.25,1); }
      .meal-section[open] .meal-head { border-bottom: 1px solid var(--line); }
      .meal-section[open] .meal-head::after { content: "›"; transform: rotate(-90deg); }
      .meal-title { display: inline-flex; align-items: center; gap: 8px; }
      .meal-dot {
        display: inline-block;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--soft);
        box-shadow: inset 0 0 0 9px var(--surface-strong);
      }
      .meal-section[data-meal="morning"] .meal-dot { background: rgba(255, 149, 0, 0.28); }
      .meal-section[data-meal="noon"] .meal-dot { background: rgba(52, 120, 246, 0.28); }
      .meal-section[data-meal="evening"] .meal-dot { background: rgba(142, 141, 246, 0.3); }
      .meal-name { font-size: 15px; font-weight: 900; }
      .meal-totals { min-width: 0; color: var(--muted); font-size: 11px; font-weight: 800; text-align: right; }
      .meal-content { padding: 0 11px; }
      .meal-empty { padding: 14px 2px; color: var(--empty); font-size: 13px; font-weight: 700; }
      .meal-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto 34px;
        gap: 7px 10px;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--row-line);
      }
      .food-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .food-name { min-width: 0; font-weight: 900; overflow-wrap: anywhere; }
      .portion-inline { display: inline-flex; align-items: center; gap: 4px; color: var(--blue); font-size: 12px; font-weight: 900; white-space: nowrap; }
      .portion-input { width: 58px; min-height: 32px; padding: 5px 7px; text-align: center; }
      .row-kcal { color: var(--ink); font-size: 17px; font-weight: 900; white-space: nowrap; }
      .row-kcal span { color: var(--muted); font-size: 10px; font-weight: 800; }
      .row-macros {
        grid-column: 1 / 3;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        white-space: normal;
      }
      .delete-btn {
        width: 34px;
        height: 34px;
        border: 1px solid rgba(200, 70, 48, 0.25);
        border-radius: 6px;
        background: var(--control);
        font-size: 16px;
        font-weight: 900;
      }
      .calendar-strip-panel {
        margin-top: 12px;
        border-top: 1px solid var(--row-line);
        padding: 12px 0 0;
        background: transparent;
      }
      .tools { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      .tools details:has(.library-form)[open] { grid-column: 1 / -1; }
      details {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: none;
        overflow: hidden;
      }
      summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 42px;
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 900;
        list-style: none;
      }
      summary::-webkit-details-marker { display: none; }
      summary::after { content: "›"; color: var(--muted); font-size: 22px; font-weight: 500; transition: transform 220ms cubic-bezier(.25,.8,.25,1); }
      details[open] summary { border-bottom: 1px solid var(--line); }
      details[open] summary::after { content: "›"; transform: rotate(90deg); }
      .detail-body { padding: 13px; }
      .settings-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; }
      .settings-grid input { min-height: 34px; padding-block: 6px; }
      .settings-note { margin: 8px 0 0; color: var(--muted); font-size: 11px; }
      .summary-settings {
        margin-top: 10px;
        background: var(--surface-strong);
      }
      .summary-settings .detail-body { padding: 10px; }
      .sync-row { display: grid; grid-template-columns: minmax(180px, 1fr) auto auto; gap: 8px; align-items: end; }
      .sync-field { position: relative; }
      .sync-field input { padding-right: 82px; font-family: ui-monospace, monospace; text-transform: uppercase; }
      .sync-status { position: absolute; right: 9px; bottom: 11px; color: var(--muted); font-size: 10px; font-weight: 900; }
      .sync-status[data-state="synced"] { color: var(--green); }
      .sync-status[data-state="error"] { color: var(--red); }
      .data-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .calendar-head { display: grid; grid-template-columns: 34px 1fr 34px auto; gap: 7px; align-items: center; }
      .month-title { text-align: center; font-weight: 900; }
      .calendar {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 8px 1px 1px;
        scroll-snap-type: x proximity;
      }
      .day {
        flex: 0 0 54px;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 6px 5px;
        background: var(--control);
        text-align: center;
        scroll-snap-align: start;
      }
      .day.active { border-color: var(--blue); color: #fff; background: var(--blue); box-shadow: 0 3px 10px color-mix(in srgb, var(--blue), transparent 68%); }
      .day.active .day-week, .day.active .day-kcal { color: rgba(255, 255, 255, 0.82); }
      .day-number { display: block; font-size: 14px; font-weight: 900; }
      .day-week { display: block; margin-top: 2px; color: var(--muted); font-size: 10px; font-weight: 900; }
      .day-kcal { display: block; margin-top: 3px; color: var(--orange); font-size: 9px; font-weight: 900; }
      .calendar-actions { display: contents; }
      .library-form {
        display: grid;
        grid-template-columns: minmax(180px, 1.4fr) repeat(4, minmax(92px, .8fr)) 130px 90px;
        gap: 8px;
        align-items: end;
        margin-bottom: 12px;
      }
      .library-list { display: grid; gap: 7px; max-height: 380px; overflow-y: auto; }
      .library-item {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) 130px minmax(320px, 1.4fr) 72px;
        gap: 8px;
        align-items: center;
        border-bottom: 1px solid var(--row-line);
        padding: 7px 0;
      }
      .library-name { width: 100%; min-width: 0; font-weight: 900; }
      .library-macros { color: var(--muted); font-size: 11px; font-weight: 800; }
      .empty { padding: 18px; color: var(--muted); text-align: center; font-weight: 800; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
      @media (prefers-reduced-transparency: reduce) {
        .panel { background: var(--surface-strong); backdrop-filter: none; -webkit-backdrop-filter: none; }
      }
      @media (prefers-contrast: more) {
        :root { --line: rgba(0, 0, 0, 0.34); }
        :root[data-theme="dark"] { --line: rgba(255, 255, 255, 0.38); }
      }
      @media (max-width: 980px) {
        .app-grid {
          grid-template-columns: minmax(0, 1fr);
          grid-template-areas:
            "add"
            "summary"
            "meals"
            "tools";
        }
        .tools { grid-template-columns: repeat(2, minmax(0, 1fr)); min-width: 0; }
      }
      @media (max-width: 760px) {
        main { width: min(100% - 16px, 820px); padding-top: 10px; }
        .topbar { display: grid; gap: 10px; }
        h1 { font-size: 23px; }
        .header-actions { display: grid; grid-template-columns: 1fr auto; gap: 7px; }
        .date-nav { justify-content: space-between; }
        .date-nav input { flex: 1; width: auto; }
        .metrics { grid-template-columns: 1fr; justify-items: center; }
        .summary-side { width: 100%; }
        .macro-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .remaining-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .metric { padding-inline: 2px; }
        .metric strong { font-size: 18px; }
        .add-controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .selected-food, .add-controls .btn { grid-column: 1 / -1; }
        .meals, .tools { grid-template-columns: minmax(0, 1fr); }
        .meal-row { grid-template-columns: minmax(0, 1fr) auto 34px; }
        .meal-head { grid-template-columns: auto minmax(0, 1fr) auto; gap: 7px; padding-inline: 9px; }
        .meal-totals { font-size: 10px; line-height: 1.35; }
        .food-line { flex-wrap: wrap; }
        .row-macros { grid-column: 1 / 3; grid-row: 2; white-space: normal; }
        .delete-btn { grid-column: 3; grid-row: 1 / 3; }
        .sync-row { grid-template-columns: 1fr 1fr; }
        .sync-field { grid-column: 1 / -1; }
        .settings-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .library-form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .library-form label:first-child, .library-form .btn { grid-column: 1 / -1; }
        .library-item { grid-template-columns: minmax(100px, 1fr) 96px 42px; }
        .library-macros { grid-column: 1 / 3; }
        .calendar { gap: 3px; }
        .day { min-height: 43px; padding: 4px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">

    <script type="module">

      } from "./tracker-core.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDbLCcDs-Gk6ev2zSUT4cdYAgvpqUzSUEY",
        authDomain: "daily-calorie-tracker-3ec47.firebaseapp.com",
        projectId: "daily-calorie-tracker-3ec47",
        storageBucket: "daily-calorie-tracker-3ec47.firebasestorage.app",
        messagingSenderId: "197589959166",

      };
      const storeKey = "calorie-tracker-v1";
      const syncCodeKey = `${storeKey}-sync-code`;
      const deviceIdKey = `${storeKey}-device-id`;
      const themeKey = `${storeKey}-theme`;
      const firebaseApp = initializeApp(firebaseConfig);
      const auth = getAuth(firebaseApp);
      const db = getFirestore(firebaseApp);
      const today = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      const toDateKey = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      const dateKeyToDate = (key) => {
        const [year, month, day] = key.split("-").map(Number);
        return new Date(year, month - 1, day);
      };
      const uid = () => `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const deviceId = localStorage.getItem(deviceIdKey) || crypto.randomUUID();
      localStorage.setItem(deviceIdKey, deviceId);
      const numberValue = (value) => Number.parseFloat(value) || 0;
      const format = (value, digits = 1) => Number(value || 0).toFixed(digits).replace(/\.0$/, "");
      const meals = [
        { id: "morning", name: "早上" },
        { id: "noon", name: "中午" },
        { id: "evening", name: "晚上" },
      ];
      const defaults = {
        labels: {},
        settings: { weight: 90, carbFactor: 2.5, proteinFactor: 1.6, fatFactor: 0.9 },
        library: [
          normalizeFood({ id: "egg", name: "鸡蛋", carb: 2, protein: 7, fat: 5, kcal: 70 }),
          normalizeFood({ id: "rice", name: "米饭", carb: 26, protein: 2.6, fat: 0.3, kcal: 116 }),
          normalizeFood({ id: "chicken", name: "鸡胸肉", carb: 0, protein: 24, fat: 2.6, kcal: 120 }),
        ],
        days: {},
      };

      let state = loadState();
      let selectedDate = toDateKey(today);
      let visibleMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      let activeCategory = "carb";
      let selectedFoodId = "";
      let authReady = false;
      let activeSyncCode = "";
      let stopCloudListener = null;
      let cloudSaveTimer = null;
      let applyingCloudState = false;
      let lastMutationAt = latestUpdateTime(state);

      const $ = (selector) => document.querySelector(selector);
      const els = {
        selectedDate: $("#selectedDate"), prevDay: $("#prevDay"), nextDay: $("#nextDay"),
        themeToggle: $("#themeToggle"),
        metrics: $("#metrics"), foodCount: $("#foodCount"), foodSearch: $("#foodSearch"), foodButtons: $("#foodButtons"),
        selectedFood: $("#selectedFood"), mealSelect: $("#mealSelect"), portion: $("#portion"),
        addDailyFood: $("#addDailyFood"), mealSummary: $("#mealSummary"),
        weight: $("#weight"), carbFactor: $("#carbFactor"), proteinFactor: $("#proteinFactor"), fatFactor: $("#fatFactor"),
        syncCode: $("#syncCode"), syncStatus: $("#syncStatus"), createSyncCode: $("#createSyncCode"), connectSync: $("#connectSync"),
        exportData: $("#exportData"), importData: $("#importData"), importFile: $("#importFile"), resetAll: $("#resetAll"),
        calendar: $("#calendar"), monthTitle: $("#monthTitle"), prevMonth: $("#prevMonth"), nextMonth: $("#nextMonth"), todayBtn: $("#todayBtn"),
        newName: $("#newName"), newCarb: $("#newCarb"), newProtein: $("#newProtein"), newFat: $("#newFat"),
        newKcal: $("#newKcal"), newCategory: $("#newCategory"), addLibraryFood: $("#addLibraryFood"), libraryList: $("#libraryList"),
      };

      function normalizeImportedState(data) {
        if (!data || typeof data !== "object") return null;
        const imported = data.app === storeKey && data.data ? data.data : data;
        return normalizeTrackerState(imported, defaults);
      }
      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(storeKey));
          return saved
            ? normalizeImportedState(saved) || normalizeTrackerState(defaults, defaults)
            : normalizeTrackerState(defaults, defaults);
        } catch {
          return normalizeTrackerState(defaults, defaults);
        }
      }
      function saveState() {
        lastMutationAt = Math.max(lastMutationAt, latestUpdateTime(state));
        localStorage.setItem(storeKey, JSON.stringify(state));
        if (!applyingCloudState) scheduleCloudSave();
      }
      function latestUpdateTime(value) {
        if (!value || typeof value !== "object") return 0;
        const ownTime = numberValue(value.updatedAt);
        return Object.values(value).reduce(
          (latest, item) => Math.max(latest, latestUpdateTime(item)),
          ownTime,
        );
      }
      function syncStamp() {
        lastMutationAt = Math.max(Date.now(), lastMutationAt + 1);
        return { updatedAt: lastMutationAt, updatedBy: deviceId };
      }
      function statesMatch(left, right) {
        return JSON.stringify(normalizeTrackerState(left, defaults))
          === JSON.stringify(normalizeTrackerState(right, defaults));
      }
      function applyMergedState(next) {
        applyingCloudState = true;
        state = normalizeTrackerState(next, defaults);
        lastMutationAt = Math.max(lastMutationAt, latestUpdateTime(state));
        localStorage.setItem(storeKey, JSON.stringify(state));
        renderAll();
        applyingCloudState = false;
      }
      function setTheme(theme) {
        const normalized = theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = normalized;
        els.themeToggle.textContent = normalized === "dark" ? "日" : "夜";
        els.themeToggle.setAttribute("aria-pressed", normalized === "dark" ? "true" : "false");
        els.themeToggle.setAttribute("title", normalized === "dark" ? "切换到日间模式" : "切换到夜晚模式");
        localStorage.setItem(themeKey, normalized);
      }
      function dailyRows() {
        if (!state.days[selectedDate]) state.days[selectedDate] = [];
        return state.days[selectedDate];
      }
      function sumRows(rows) {
        return sumNutrition(rows);
      }
      function goalValues() {
        const { weight, carbFactor, proteinFactor, fatFactor } = state.settings;
        const carb = numberValue(weight) * numberValue(carbFactor);
        const protein = numberValue(weight) * numberValue(proteinFactor);
        const fat = numberValue(weight) * numberValue(fatFactor);
        return { carb, protein, fat, kcal: carb * 4 + protein * 4 + fat * 9 };
      }
      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
      }
      function foodUsageStats() {
        const stats = new Map();
        Object.entries(state.days || {}).forEach(([date, rows]) => {
          (rows || []).forEach((row) => {
            const key = row.foodId || state.library.find((food) => food.name === row.name)?.id;
            if (!key) return;
            const current = stats.get(key) || { count: 0, lastDate: "" };
            current.count += 1;
            if (date > current.lastDate) current.lastDate = date;
            stats.set(key, current);
          });
        });
        return stats;
      }
      function searchText(value) {
        return String(value || "").trim().toLocaleLowerCase("zh-CN");
      }

      function renderMetrics() {
        const eaten = sumRows(dailyRows());
        const goal = goalValues();
        const percent = (current, target) => target > 0 ? Math.min((current / target) * 100, 100) : 0;
        const fullPercent = (current, target) => target > 0 ? Math.round((current / target) * 100) : 0;
        const remaining = (target, current) => Math.max(target - current, 0);
        const macroItems = [
          ["carb", "碳水", eaten.carb, goal.carb, "g", 1],
          ["protein", "蛋白质", eaten.protein, goal.protein, "g", 1],
          ["fat", "脂肪", eaten.fat, goal.fat, "g", 1],
        ];
        els.metrics.innerHTML = `
          <div class="calorie-ring" style="--pct:${percent(eaten.kcal, goal.kcal)}">
            <div class="ring-center">
              <strong>${format(eaten.kcal, 0)}</strong>
              <span>/ ${format(goal.kcal, 0)} kcal</span>
              <span>今日摄入</span>
            </div>
          </div>
          <div class="summary-side">
            <div class="summary-title">
              <div>
                <h2>今日摄入总览</h2>
                <p>${selectedDate} · 目标由体重和系数自动计算</p>
              </div>
            </div>
            <div class="macro-grid">
              ${macroItems.map(([kind, name, current, target, unit, digits]) => `
                <div class="metric" data-kind="${kind}">
                  <div class="mini-ring" style="--pct:${percent(current, target)}" data-percent="${fullPercent(current, target)}%"></div>
                  <div>
                    <span>${name}</span>
                    <strong>${format(current, digits)} ${unit}</strong>
                    <small>目标 ${format(target, digits)} ${unit}</small>
                  </div>
                </div>
              `).join("")}
            </div>
            <div class="remaining-strip">
              <div class="remaining-item"><span>剩余热量</span><strong>${format(remaining(goal.kcal, eaten.kcal), 0)} kcal</strong></div>
              <div class="remaining-item"><span>已完成</span><strong>${fullPercent(eaten.kcal, goal.kcal)}%</strong></div>
              <div class="remaining-item"><span>体重</span><strong>${format(state.settings.weight, 1)} kg</strong></div>
            </div>
          </div>
        `;
      }
      function renderFoodButtons() {
        const usage = foodUsageStats();
        const query = searchText(els.foodSearch.value);
        const baseFoods = state.library.filter((food) => food.category === activeCategory);
        const foods = query
          ? sortFoodsByName(baseFoods.filter((food) => searchText(food.name).includes(query)))
          : sortFoodsByName(baseFoods).sort((left, right) => {
              const leftUsage = usage.get(left.id) || { count: 0, lastDate: "" };
              const rightUsage = usage.get(right.id) || { count: 0, lastDate: "" };
              if (rightUsage.count !== leftUsage.count) return rightUsage.count - leftUsage.count;
              return rightUsage.lastDate.localeCompare(leftUsage.lastDate);
            });
        if (!foods.some((food) => food.id === selectedFoodId)) selectedFoodId = "";
        els.foodCount.textContent = query ? `${foods.length} 个结果` : `${foods.length} 项`;
        els.foodButtons.innerHTML = foods.length
          ? foods.map((food) => {
              const meta = `${format(food.kcal, 0)} kcal / 份`;
              return `<button class="food-chip ${food.id === selectedFoodId ? "active" : ""}" data-food-id="${food.id}" type="button"><strong>${escapeHtml(food.name)}</strong><small>${meta}</small></button>`;
            }).join("")
          : `<div class="empty">${query ? "没有找到这个食物" : "这个分类还没有食物"}</div>`;
        const selected = state.library.find((food) => food.id === selectedFoodId);
        els.selectedFood.innerHTML = selected ? `已选择：<b>${escapeHtml(selected.name)}</b>` : "先点击上方食物";
      }
      function renderMeals() {
        const openMealIds = collectOpenMealIds(
          els.mealSummary.querySelectorAll("details.meal-section"),
        );
        const rows = dailyRows();
        els.mealSummary.innerHTML = meals.map((meal) => {
          const mealRows = rows.filter((row) => row.meal === meal.id);
          const total = sumRows(mealRows);
          const content = mealRows.length ? mealRows.map((row) => `
            <div class="meal-row" data-row="${row.id}">
              <div class="food-line">
                <span class="food-name">${escapeHtml(row.name)}</span>
                <span class="portion-inline">× <input class="portion-input" data-portion type="number" min="0.1" step="0.5" value="${format(row.portion)}" aria-label="${escapeHtml(row.name)}份数" /> 份</span>
              </div>
              <div class="row-kcal">${format(row.kcal, 0)} <span>kcal</span></div>
              <div class="row-macros">${format(row.carb)}g 碳水 · ${format(row.protein)}g 蛋白质 · ${format(row.fat)}g 脂肪</div>
              <button class="delete-btn" data-delete="${row.id}" type="button" aria-label="删除${escapeHtml(row.name)}">×</button>
            </div>
          `).join("") : `<div class="meal-empty">还没记录，先从上方添加食物。</div>`;
          return `
            <details class="meal-section" data-meal="${meal.id}" ${openMealIds.has(meal.id) ? "open" : ""}>
              <summary class="meal-head">
                <span class="meal-title"><span class="meal-dot" aria-hidden="true"></span><span class="meal-name">${meal.name}</span></span>
                <span class="meal-totals">${format(total.carb)}g 碳水 · ${format(total.protein)}g 蛋白质 · ${format(total.fat)}g 脂肪 · ${format(total.kcal, 0)} kcal</span>

              <div class="meal-content">${content}</div>
            </details>
          `;
        }).join("");
      }
      function renderSettings() {
        els.weight.value = state.settings.weight;
        els.carbFactor.value = state.settings.carbFactor;
        els.proteinFactor.value = state.settings.proteinFactor;
        els.fatFactor.value = state.settings.fatFactor;
      }
      function renderLibrary() {
        els.libraryList.innerHTML = state.library.map((food) => `
          <div class="library-item" data-library-id="${food.id}">
            <input class="library-name" data-food-name value="${escapeHtml(food.name)}" aria-label="${escapeHtml(food.name)}名称" />

        renderFoodButtons();

      function renderCalendar() {
        const year = visibleMonth.getFullYear();

        const food = state.library.find((item) => item.id === selectedFoodId);
        const portion = Math.max(numberValue(els.portion.value), 0.1);
        if (!food) return;
        const row = {
          id: uid(), foodId: food.id, meal: els.mealSelect.value, name: food.name, portion,
          baseCarb: food.carb, baseProtein: food.protein, baseFat: food.fat, baseKcal: food.kcal,
          carb: 0, protein: 0, fat: 0, kcal: 0,
          ...syncStamp(),
        };
        updateRowPortion(row, portion);
        dailyRows().push(row);
        els.portion.value = "1";
        saveState();
        renderMetrics();
        renderFoodButtons();
        renderMeals();
        renderCalendar();
      });
      els.mealSummary.addEventListener("change", (event) => {
        const input = event.target.closest("[data-portion]");
        if (!input) return;
        const row = dailyRows().find((item) => item.id === input.closest("[data-row]").dataset.row);
        if (!row) return;
        updateRowPortion(row, input.value);
        Object.assign(row, syncStamp());
        saveState();
        renderMetrics();
        renderMeals();
        renderCalendar();
      });
      els.mealSummary.addEventListener("click", (event) => {
        const button = event.target.closest("[data-delete]");
        if (!button) return;
        state.syncMeta.rowTombstones[button.dataset.delete] = syncStamp();
        state.days[selectedDate] = dailyRows().filter((row) => row.id !== button.dataset.delete);
        saveState();
        renderMetrics();
        renderMeals();
        renderCalendar();
      });
      ["weight", "carbFactor", "proteinFactor", "fatFactor"].forEach((key) => {
        els[key].addEventListener("input", () => {
          state.settings[key] = numberValue(els[key].value);
          state.syncMeta.settings = syncStamp();
          saveState();
          renderMetrics();
        });
      });
      els.addLibraryFood.addEventListener("click", () => {
        const name = els.newName.value.trim();
        if (!name) return;
        const draft = {
          id: uid(), name, carb: numberValue(els.newCarb.value), protein: numberValue(els.newProtein.value),
          fat: numberValue(els.newFat.value), kcal: numberValue(els.newKcal.value),
          ...syncStamp(),
        };
        draft.category = els.newCategory.value === "auto" ? inferFoodCategory(draft) : els.newCategory.value;
        state.library.push(normalizeFood(draft));
        els.newName.value = "";
        saveState();
        renderLibrary();
      });
      els.libraryList.addEventListener("input", (event) => {
        const nameInput = event.target.closest("[data-food-name]");
        const item = event.target.closest("[data-library-id]");
        if (!nameInput || !item) return;
        const food = state.library.find((entry) => entry.id === item.dataset.libraryId);
        if (!food || !updateFoodName(food, nameInput.value)) return;
        Object.assign(food, syncStamp());
        saveState();
        renderFoodButtons();
      });
      els.libraryList.addEventListener("change", (event) => {
        const item = event.target.closest("[data-library-id]");
        if (!item) return;
        const food = state.library.find((entry) => entry.id === item.dataset.libraryId);
        if (!food) return;
        const nameInput = event.target.closest("[data-food-name]");
        if (nameInput) {
          nameInput.value = food.name;
          renderLibrary();
          return;
        }
        const select = event.target.closest("[data-food-category]");
        if (!select) return;
        food.category = select.value;
        Object.assign(food, syncStamp());
        saveState();
        renderFoodButtons();
      });
      els.libraryList.addEventListener("keydown", (event) => {
        const nameInput = event.target.closest("[data-food-name]");
        if (!nameInput || event.key !== "Enter") return;
        event.preventDefault();
        nameInput.blur();
      });
      els.libraryList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-delete-food]");
        if (!button) return;
        state.syncMeta.foodTombstones[button.dataset.deleteFood] = syncStamp();
        state.library = state.library.filter((food) => food.id !== button.dataset.deleteFood);
        if (selectedFoodId === button.dataset.deleteFood) selectedFoodId = "";
        saveState();
        renderLibrary();
      });
      els.selectedDate.addEventListener("input", () => changeSelectedDate(els.selectedDate.value || toDateKey(today)));
      els.prevDay.addEventListener("click", () => shiftDay(-1));
      els.nextDay.addEventListener("click", () => shiftDay(1));
      els.themeToggle.addEventListener("click", () => {
        setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
      });
      els.calendar.addEventListener("click", (event) => {
        const button = event.target.closest("[data-date]");
        if (button) changeSelectedDate(button.dataset.date);
      });
      els.prevMonth.addEventListener("click", () => { visibleMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth() - 1, 1); renderCalendar(); });
      els.nextMonth.addEventListener("click", () => { visibleMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth() + 1, 1); renderCalendar(); });
      els.todayBtn.addEventListener("click", () => changeSelectedDate(toDateKey(today)));

      function exportBackup() {
        const blob = new Blob([JSON.stringify({ app: storeKey, exportedAt: new Date().toISOString(), data: state }, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `每日卡路里记录-${toDateKey(new Date())}.json`;
        document.body.append(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
      els.exportData.addEventListener("click", exportBackup);
      els.importData.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", async () => {
        const file = els.importFile.files?.[0];
        if (!file) return;
        try {
          const imported = normalizeImportedState(JSON.parse(await file.text()));
          if (!imported) return alert("导入失败：文件格式不正确。");
          if (!confirm("导入会覆盖当前记录，确定继续吗？")) return;
          state = imported;
          saveState();
          renderAll();
          alert("导入成功。");
        } catch {
          alert("导入失败：无法读取这个 JSON 文件。");
        } finally {
          els.importFile.value = "";
        }
      });
      els.resetAll.addEventListener("click", () => {
        if (!confirm("确定重置为示例数据吗？")) return;
        const deleted = syncStamp();
        const foodTombstones = { ...state.syncMeta.foodTombstones };
        const rowTombstones = { ...state.syncMeta.rowTombstones };
        state.library.forEach((food) => { foodTombstones[food.id] = deleted; });
        Object.values(state.days).flat().forEach((row) => { rowTombstones[row.id] = deleted; });
        const restored = syncStamp();
        state = normalizeTrackerState(defaults, defaults);
        state.library.forEach((food) => Object.assign(food, restored));
        state.syncMeta = {
          foodTombstones,
          rowTombstones,
          settings: restored,
          labels: restored,
        };
        saveState();
        renderAll();
      });

      function cleanSyncCode(value) {
        return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 24);
      }
      function generateSyncCode() {
        const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        return Array.from(crypto.getRandomValues(new Uint8Array(20)), (byte) => alphabet[byte % alphabet.length]).join("");
      }
      function setSyncStatus(text, status = "local") {
        els.syncStatus.textContent = text;
        els.syncStatus.dataset.state = status;
      }
      function scheduleCloudSave() {
        if (!authReady || !activeSyncCode) return;
        clearTimeout(cloudSaveTimer);
        setSyncStatus("同步中");
        cloudSaveTimer = setTimeout(pushStateToCloud, 700);
      }
      async function mergeIntoCloud(syncRef, localState) {
        return runTransaction(db, async (transaction) => {
          const snapshot = await transaction.get(syncRef);
          const remote = snapshot.exists() ? normalizeImportedState(snapshot.data().data) : null;
          const merged = remote
            ? mergeTrackerStates(localState, remote, defaults)
            : normalizeTrackerState(localState, defaults);
          transaction.set(syncRef, { data: structuredClone(merged), updatedAt: serverTimestamp() });
          return merged;
        });
      }
      async function pushStateToCloud() {
        if (!authReady || !activeSyncCode) return;
        try {
          const syncRef = doc(db, "syncSpaces", activeSyncCode);
          const cloudMerged = await mergeIntoCloud(syncRef, structuredClone(state));
          const converged = mergeTrackerStates(state, cloudMerged, defaults);
          const hasPendingChanges = !statesMatch(converged, cloudMerged);
          applyMergedState(converged);
          if (hasPendingChanges) scheduleCloudSave();
          else setSyncStatus("已同步", "synced");
        } catch (error) {
          console.error("Cloud sync failed", error);
          setSyncStatus(navigator.onLine ? "同步失败" : "离线", "error");
        }
      }
      async function connectCloudSync(code) {
        const normalized = cleanSyncCode(code);
        if (normalized.length < 12) return alert("同步码至少需要 12 位。");
        els.syncCode.value = normalized;
        localStorage.setItem(syncCodeKey, normalized);
        if (!authReady) return setSyncStatus("正在连接");
        stopCloudListener?.();
        activeSyncCode = normalized;
        setSyncStatus("连接中");
        const syncRef = doc(db, "syncSpaces", normalized);
        try {
          const cloudMerged = await mergeIntoCloud(syncRef, structuredClone(state));
          const converged = mergeTrackerStates(state, cloudMerged, defaults);
          const hasPendingChanges = !statesMatch(converged, cloudMerged);
          applyMergedState(converged);
          stopCloudListener = onSnapshot(syncRef, (cloudSnapshot) => {
            if (!cloudSnapshot.exists()) return;
            const remote = normalizeImportedState(cloudSnapshot.data().data);
            if (!remote) return;
            const next = mergeTrackerStates(state, remote, defaults);
            const cloudNeedsUpdate = !statesMatch(next, remote);
            applyMergedState(next);
            if (cloudNeedsUpdate) scheduleCloudSave();
            else setSyncStatus("已同步", "synced");
          }, (error) => {
            console.error("Cloud listener failed", error);
            setSyncStatus("同步失败", "error");
          });
          if (hasPendingChanges) scheduleCloudSave();
          else setSyncStatus("已同步", "synced");
        } catch (error) {
          console.error("Cloud connection failed", error);
          activeSyncCode = "";
          setSyncStatus(navigator.onLine ? "连接失败" : "离线", "error");
        }
      }
      els.syncCode.addEventListener("input", () => { els.syncCode.value = cleanSyncCode(els.syncCode.value); });
      els.createSyncCode.addEventListener("click", () => connectCloudSync(generateSyncCode()));
      els.connectSync.addEventListener("click", () => connectCloudSync(els.syncCode.value));
      window.addEventListener("online", () => activeSyncCode && scheduleCloudSave());
      window.addEventListener("offline", () => activeSyncCode && setSyncStatus("离线", "error"));
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          try { await signInAnonymously(auth); }
          catch (error) { console.error("Anonymous sign-in failed", error); setSyncStatus("云端不可用", "error"); }
          return;
        }
        authReady = true;
        const savedCode = cleanSyncCode(localStorage.getItem(syncCodeKey));
        if (savedCode) connectCloudSync(savedCode);
      });

      els.mealSelect.innerHTML = meals.map((meal) => `<option value="${meal.id}">${meal.name}</option>`).join("");
      setTheme(localStorage.getItem(themeKey) || "light");
      renderAll();
    </script>
  </body>
</html>
